name: Server image (v0.2 stub)

# Remembug team-sync server is a v0.2 deliverable — see packages/server/.
# This workflow is wired up so the OCI build is reproducible the day the
# implementation lands. It runs on demand only; pushes to GHCR are gated
# on the placeholder Dockerfile being replaced with the real one.

on:
  workflow_dispatch:
    inputs:
      push:
        description: 'Push image to GHCR (requires the server to be implemented).'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build server image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect placeholder Dockerfile
        id: detect
        run: |
          if grep -q 'team-sync server is not yet implemented' packages/server/Dockerfile; then
            echo 'placeholder=true' >> "$GITHUB_OUTPUT"
          else
            echo 'placeholder=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ inputs.push == 'true' && steps.detect.outputs.placeholder == 'false' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and conditionally push)
        uses: docker/build-push-action@v6
        with:
          context: packages/server
          file: packages/server/Dockerfile
          push: ${{ inputs.push == 'true' && steps.detect.outputs.placeholder == 'false' }}
          tags: ghcr.io/${{ github.repository_owner }}/remembug-server:edge
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Warn on placeholder
        if: ${{ steps.detect.outputs.placeholder == 'true' }}
        run: |
          echo '::warning::Built the placeholder Dockerfile only. Real server not yet implemented; image will not be pushed.'
